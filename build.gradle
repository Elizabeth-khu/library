plugins {
    id 'java'
    id 'application'
}

group = 'com.example'
version = '1.0.0'

repositories {
    mavenCentral()
}

dependencies {
    // Spring
    implementation "org.springframework:spring-context:6.2.7"
    implementation "org.springframework:spring-aop:6.2.7"
    implementation "org.springframework:spring-jdbc:6.2.7"

    // AspectJ weaver (for AOP)
    implementation "org.aspectj:aspectjweaver:1.9.22.1"

    // Jackson CSV
    implementation "com.fasterxml.jackson.dataformat:jackson-dataformat-csv:2.17.2"
    implementation "com.fasterxml.jackson.core:jackson-databind:2.17.2"

    // PostgreSQL driver
    runtimeOnly "org.postgresql:postgresql:42.7.4"

    // Tests
    testImplementation platform("org.junit:junit-bom:5.10.2")
    testImplementation "org.junit.jupiter:junit-jupiter"
}

test {
    useJUnitPlatform()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

application {
    mainClass = 'com.example.library.Main'
}

tasks.named('run') {
    standardInput = System.in
}

gradle.startParameter.consoleOutput = ConsoleOutput.Plain