spring.datasource.url=jdbc:postgresql://localhost:5432/library
spring.datasource.username=elizabeth
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.current_session_context_class=org.springframework.orm.jpa.hibernate.SpringSessionContext

spring.autoconfigure.domain.packages=com.example.library.domain